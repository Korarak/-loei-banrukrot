name: Build and Deploy to Portainer

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Private Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/loei-banrakrod-backend:latest
          cache-from: type=registry,ref=${{ secrets.REGISTRY_URL }}/loei-banrakrod-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_URL }}/loei-banrakrod-backend:buildcache,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/loei-banrakrod-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=registry,ref=${{ secrets.REGISTRY_URL }}/loei-banrakrod-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_URL }}/loei-banrakrod-frontend:buildcache,mode=max

  deploy:
    runs-on: ubuntu-24.04
    needs: build-and-push
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          username: ${{ secrets.SERVER_SSH_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Ensure the directory exists
            mkdir -p /home/${{ secrets.SERVER_SSH_USERNAME }}/loei-banrakrod
            cd /home/${{ secrets.SERVER_SSH_USERNAME }}/loei-banrakrod
            
            # Authenticate server to pull image
            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_URL }} -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
            
            export REGISTRY_URL=${{ secrets.REGISTRY_URL }}
            
            # Pull latest images and recreate containers
            docker-compose down
            docker-compose pull
            docker-compose up -d      
