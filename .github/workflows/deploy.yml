name: Build and Deploy to Portainer

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Private Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/loei-banrakrod-backend:latest
          cache-from: type=registry,ref=${{ secrets.REGISTRY_URL }}/loei-banrakrod-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_URL }}/loei-banrakrod-backend:buildcache,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/loei-banrakrod-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=registry,ref=${{ secrets.REGISTRY_URL }}/loei-banrakrod-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_URL }}/loei-banrakrod-frontend:buildcache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: Deploy Backend via Portainer Webhook
        run: |
          if [ -n "${{ secrets.PORTAINER_WEBHOOK_URL_BACKEND }}" ]; then
            curl -X POST "${{ secrets.PORTAINER_WEBHOOK_URL_BACKEND }}"
            echo "Backend deployment triggered"
          else
            echo "PORTAINER_WEBHOOK_URL_BACKEND secret is not set, skipping backend deployment"
          fi

      - name: Deploy Frontend via Portainer Webhook
        run: |
          if [ -n "${{ secrets.PORTAINER_WEBHOOK_URL_FRONTEND }}" ]; then
            curl -X POST "${{ secrets.PORTAINER_WEBHOOK_URL_FRONTEND }}"
            echo "Frontend deployment triggered"
          else
            echo "PORTAINER_WEBHOOK_URL_FRONTEND secret is not set, skipping frontend deployment"
          fi
